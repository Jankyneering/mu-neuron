# board/universal/genimage.cfg
# NOTE: this file is only used by the 'merge-boot' / 'final-image' Makefile
# targets which assemble a single universal image from all per-board builds.
# For normal per-board builds (make build-rpi3 etc.) Buildroot generates its
# own genimage.cfg automatically via the raspberrypi post-image.sh script.

# boot.vfat — FAT partition containing kernels, firmware, DTBs, overlays
image boot.vfat {
    vfat {
        files = {
            # Two kernels — rpi4 covers BCM2710 (rpi3/zero2w) and BCM2711 (rpi4/cm4)
            # rpi5 covers BCM2712 (rpi5/cm5)
            "kernel-rpi4.img",
            "kernel-rpi5.img",

            # Board config and kernel cmdline
            "config.txt",
            "cmdline.txt",

            # BCM2710 firmware (Pi 3 / Zero 2W)
            "start.elf",
            "fixup.dat",
            "bootcode.bin",

            # BCM2711 firmware (Pi 4 / CM4)
            "start4.elf",
            "fixup4.dat",

            # DTBs and overlays (populated by merge-boot)
            "overlays",
        }
    }
    size = 128M
}

# sdcard.img — full partitioned image (MBR, matches per-board layout)
image sdcard.img {
    hdimage {
    }

    partition boot {
        partition-type = 0xC
        bootable = "true"
        image = "boot.vfat"
        size = 128M
    }

    partition rootfs {
        partition-type = 0x83
        image = "rootfs.ext4"
    }
}
