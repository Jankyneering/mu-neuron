# boot.vfat — FAT partition containing kernel, firmware, overlays
image boot.vfat {
    vfat {
        files = {
            "kernel-rpi4.img",
            "kernel-rpi5.img",
            "config.txt",
            "cmdline.txt",
            "start.elf",
            "fixup.dat",
            "start4.elf",
            "fixup4.dat",
            "overlays",
        }
    }
    size = 128M
}

# sdcard.img — full partitioned image
# rootfs.ext4 is pre-built by Buildroot and passed via --inputpath
image sdcard.img {
    hdimage {
        partition-table-type = "gpt"
    }

    partition boot {
        partition-type-uuid = c12a7328-f81f-11d2-ba4b-00a0c93ec93b
        image = "boot.vfat"
        size = 128M
        bootable = true
    }

    partition rootfs {
        partition-type-uuid = 0fc63daf-8483-4772-8e79-3d69d8477de4
        image = "rootfs.ext4"
        # No size specified — genimage uses the exact size of the input file
    }
}
