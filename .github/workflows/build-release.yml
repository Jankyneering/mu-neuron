name: Build Release Images

# Trigger on version tags (e.g. v1.0.0, v2.3.1)
on:
  push:
    tags:
      - 'v*'

# Allow only one release build at a time
concurrency:
  group: release-build
  cancel-in-progress: false

env:
  BUILDROOT_VERSION: 2025.02.13 # Keep in sync with your submodule pin

jobs:
  # ============================================================================
  # Build each target in a separate parallel job
  # Each runner has ~14GB free — one target at a time fits comfortably
  # ============================================================================
  build-target:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours per target

    strategy:
      fail-fast: false  # Don't cancel other targets if one fails
      matrix:
        target: [rpi3, rpi4, rpi5, zero2w, cm4, cm5]

    steps:
      - name: Free up disk space
        # GitHub runners have ~25GB total, ~14GB free. Buildroot needs ~15-20GB.
        # Remove pre-installed tools we don't need.
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force 2>/dev/null || true
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Also initializes the buildroot submodule

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            bc \
            build-essential \
            bzr \
            ca-certificates \
            cmake \
            cpio \
            curl \
            cvs \
            file \
            g++ \
            git \
            libncurses5-dev \
            locales \
            mercurial \
            python3 \
            python3-magic \
            python3-pexpect \
            rsync \
            subversion \
            unzip \
            wget \
            genimage \
            libssl-dev \
            bison \
            flex \
            libelf-dev \
            dosfstools \
            mtools

      - name: Install host tar >= 1.35
        # Buildroot requires tar >= 1.35; Ubuntu runners may have an older version
        run: |
          TAR_VERSION=1.35
          curl -sfL https://ftpmirror.gnu.org/tar/tar-${TAR_VERSION}.tar.xz | \
            tar -Jx -C /tmp
          cd /tmp/tar-${TAR_VERSION}
          FORCE_UNSAFE_CONFIGURE=1 ./configure --disable-year2038
          make -j$(nproc)
          sudo make install
          tar --version

      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        with:
          path: dl/
          # Cache key includes the target and Buildroot version.
          # Falls back to a shared base key so targets share downloaded sources.
          key: buildroot-dl-${{ env.BUILDROOT_VERSION }}-${{ matrix.target }}-${{ hashFiles(format('configs/muneuron_{0}_defconfig', matrix.target)) }}
          restore-keys: |
            buildroot-dl-${{ env.BUILDROOT_VERSION }}-${{ matrix.target }}-
            buildroot-dl-${{ env.BUILDROOT_VERSION }}-

      - name: Build ${{ matrix.target }}
        run: |
          make build-${{ matrix.target }}

      - name: Check disk usage
        if: always()
        run: df -h

      - name: Prepare artifacts
        # rootfs.ext4 is a symlink to rootfs.ext2 — resolve it before upload
        # since actions/upload-artifact doesn't follow symlinks.
        # Also resolve the sdcard.img produced by the target's post-image.sh.
        run: |
          cp -L output/${{ matrix.target }}/images/rootfs.ext2 \
                 output/${{ matrix.target }}/images/rootfs-resolved.ext4
          cp -L output/${{ matrix.target }}/images/sdcard.img \
                 output/${{ matrix.target }}/images/sdcard-resolved.img

      - name: Upload target images
        uses: actions/upload-artifact@v4
        with:
          name: images-${{ matrix.target }}
          path: |
            output/${{ matrix.target }}/images/sdcard-resolved.img
          retention-days: 7
          if-no-files-found: error

  # ============================================================================
  # Create GitHub release and attach one SD card image per board
  # ============================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-target
    permissions:
      contents: write  # Required to create releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Download all target images
        uses: actions/download-artifact@v4
        with:
          pattern: images-*
          merge-multiple: false  # Keep separate directories per target

      - name: Compress and rename images
        run: |
          mkdir -p release-assets
          for target in rpi3 rpi4 rpi5 zero2w cm4 cm5; do
            src="images-${target}/sdcard-resolved.img"
            if [ ! -f "$src" ]; then
              echo "ERROR: $src not found"; ls -la images-${target}/ 2>/dev/null || true; exit 1
            fi
            echo "Compressing ${target}…"
            gzip -9 -c "$src" > "release-assets/sdcard-${target}-${{ github.ref_name }}.img.gz"
          done
          ls -lh release-assets/

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum *.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "mu-neuron ${{ github.ref_name }}"
          body: |
            ## mu-neuron ${{ github.ref_name }}

            ### Per-board SD card images

            | File | Board |
            |------|-------|
            | `sdcard-rpi3-${{ github.ref_name }}.img.gz` | Raspberry Pi 3B / 3B+ / CM3 |
            | `sdcard-rpi4-${{ github.ref_name }}.img.gz` | Raspberry Pi 4B / 400 |
            | `sdcard-rpi5-${{ github.ref_name }}.img.gz` | Raspberry Pi 5B |
            | `sdcard-zero2w-${{ github.ref_name }}.img.gz` | Raspberry Pi Zero 2W |
            | `sdcard-cm4-${{ github.ref_name }}.img.gz` | Compute Module 4 |
            | `sdcard-cm5-${{ github.ref_name }}.img.gz` | Compute Module 5 |

            ### Flash instructions
            ```bash
            # Decompress and flash in one step (replace <target> and /dev/sdX)
            gunzip -c sdcard-<target>-${{ github.ref_name }}.img.gz | sudo dd of=/dev/sdX bs=4M status=progress conv=fsync
            ```

            ### Checksums
            See `SHA256SUMS` for file integrity verification.

            ### Build info
            - Buildroot version: ${{ env.BUILDROOT_VERSION }}
            - Commit: ${{ github.sha }}
          files: |
            release-assets/sdcard-*.img.gz
            release-assets/SHA256SUMS
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
